# -*- mode:yaml;coding:utf-8 -*-
# vi: set et ft=yaml ts=2 sts=2 sw=2
#
# Chimerafile CI — build multi-backend APE binaries
#
# Produces six variants:
#   1. cpu              — CPU only
#   2. cpu+vulkan       — CPU + Vulkan GPU
#   3. cpu+cuda         — CPU + CUDA GPU
#   4. cpu+rocm         — CPU + ROCm GPU
#   5. cpu+metal        — CPU + Metal GPU (macOS)
#   6. cpu+all          — CPU + Vulkan + CUDA + ROCm (universal)

name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  MODE: rel
  LLAMAFILE_REPO: https://github.com/mozilla-ai/llamafile.git

jobs:
  # ── 1. CPU-only ───────────────────────────────────────────────────────────
  cpu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone llamafile submodule
        run: git clone --depth 1 --branch main $LLAMAFILE_REPO llamafile
      - uses: actions/cache@v4
        with:
          path: llamafile/.cosmocc
          key: cosmocc-${{ runner.os }}-4.0.2
      - run: make setup
      # stable-diffusion.cpp patches are buggy (wrong include paths).
      # Reset it so our compat header + include paths handle the job.
      - name: Reset stable-diffusion.cpp to unpatched state
        run: |
          cd llamafile/stable-diffusion.cpp
          git reset --hard
          git clean -fdx
      - run: make MODE=${{ env.MODE }}
      - uses: actions/upload-artifact@v4
        with:
          name: chimerafile-cpu
          path: llamafile/o/${{ env.MODE }}/chimerafile/chimerafile
          compression-level: 0
      - name: Upload zipalign for all-gpu job
        uses: actions/upload-artifact@v4
        with:
          name: zipalign-tool
          path: llamafile/o/${{ env.MODE }}/third_party/zipalign/zipalign
          compression-level: 0

  # ── 2. CPU + Vulkan ──────────────────────────────────────────────────────
  vulkan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone llamafile submodule
        run: git clone --depth 1 --branch main $LLAMAFILE_REPO llamafile
      - uses: actions/cache@v4
        with:
          path: llamafile/.cosmocc
          key: cosmocc-${{ runner.os }}-4.0.2
      - name: Cache Vulkan SDK
        id: cache-vulkan
        uses: actions/cache@v4
        with:
          path: /opt/vulkansdk
          key: vulkan-sdk-1.3.296.0
      - name: Install Vulkan SDK
        if: steps.cache-vulkan.outputs.cache-hit != 'true'
        run: |
          VK_VER=1.3.296.0
          sudo apt-get install -y -qq libvulkan-dev
          wget -q "https://sdk.lunarg.com/sdk/download/${VK_VER}/linux/vulkansdk-linux-x86_64-${VK_VER}.tar.xz" -O /tmp/vulkansdk.tar.xz
          sudo mkdir -p /opt/vulkansdk
          sudo tar -xJf /tmp/vulkansdk.tar.xz -C /opt/vulkansdk --strip-components=1
          rm /tmp/vulkansdk.tar.xz
      - name: Set Vulkan SDK environment
        run: |
          echo "VULKAN_SDK=/opt/vulkansdk" >> $GITHUB_ENV
          echo "/opt/vulkansdk/bin" >> $GITHUB_PATH
      - run: make setup
      - name: Reset stable-diffusion.cpp to unpatched state
        run: |
          cd llamafile/stable-diffusion.cpp
          git reset --hard
          git clean -fdx
      - name: Build Vulkan backend (verbose)
        run: |
          cd llamafile
          GGML_VERSION=0.10.0 GGML_COMMIT=7b8443ac7 \
            bash -x llamafile/vulkan.sh 2>&1 | tail -50
        shell: bash
      - run: make MODE=${{ env.MODE }}
      - uses: actions/upload-artifact@v4
        with:
          name: chimerafile-cpu+vulkan
          path: llamafile/o/${{ env.MODE }}/chimerafile/chimerafile
          compression-level: 0
      - uses: actions/upload-artifact@v4
        with:
          name: ggml-vulkan-so
          path: llamafile/o/${{ env.MODE }}/ggml-vulkan.so
          compression-level: 0

  # ── 3. CPU + CUDA ────────────────────────────────────────────────────────
  cuda:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone llamafile submodule
        run: git clone --depth 1 --branch main $LLAMAFILE_REPO llamafile
      - uses: actions/cache@v4
        with:
          path: llamafile/.cosmocc
          key: cosmocc-cuda-${{ runner.os }}-4.0.2
      - name: Install CUDA toolkit (official NVIDIA repo)
        run: |
          wget -q https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/x86_64/cuda-keyring_1.1-1_all.deb
          sudo dpkg -i cuda-keyring_1.1-1_all.deb
          sudo apt-get update -qq
          sudo apt-get install -y -qq cuda-toolkit-12-6
          echo "CUDA_PATH=/usr/local/cuda-12" >> $GITHUB_ENV
          echo "/usr/local/cuda-12/bin" >> $GITHUB_PATH
      - run: make setup
      - name: Reset stable-diffusion.cpp to unpatched state
        run: |
          cd llamafile/stable-diffusion.cpp
          git reset --hard
          git clean -fdx
      - run: make MODE=${{ env.MODE }} cuda
      - run: make MODE=${{ env.MODE }}
      - uses: actions/upload-artifact@v4
        with:
          name: chimerafile-cpu+cuda
          path: llamafile/o/${{ env.MODE }}/chimerafile/chimerafile
          compression-level: 0
      - uses: actions/upload-artifact@v4
        with:
          name: ggml-cuda-so
          path: llamafile/o/${{ env.MODE }}/ggml-cuda.so
          compression-level: 0

  # ── 4. CPU + ROCm ────────────────────────────────────────────────────────
  rocm:
    runs-on: ubuntu-latest
    container:
      image: rocm/dev-ubuntu-24.04:latest
    steps:
      - name: Install prerequisites
        run: |
          apt-get update -qq
          apt-get install -y -qq git unzip
      - uses: actions/checkout@v4
      - name: Clone llamafile submodule
        run: git clone --depth 1 --branch main $LLAMAFILE_REPO llamafile
      - uses: actions/cache@v4
        with:
          path: llamafile/.cosmocc
          key: cosmocc-rocm-${{ runner.os }}-4.0.2
      - name: Install build tools
        run: |
          apt-get update -qq
          apt-get install -y -qq make python3
      - run: make setup
      - name: Reset stable-diffusion.cpp to unpatched state
        run: |
          cd llamafile/stable-diffusion.cpp
          git reset --hard
          git clean -fdx
      - run: make MODE=${{ env.MODE }}
      - uses: actions/upload-artifact@v4
        with:
          name: chimerafile-cpu+rocm
          path: llamafile/o/${{ env.MODE }}/chimerafile/chimerafile
          compression-level: 0
      - uses: actions/upload-artifact@v4
        with:
          name: ggml-rocm-so
          path: llamafile/o/${{ env.MODE }}/ggml-rocm.so
          compression-level: 0

  # ── 5. CPU + Metal ────────────────────────────────────────────────────────
  metal:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone llamafile submodule
        run: git clone --depth 1 --branch main $LLAMAFILE_REPO llamafile
      - uses: actions/cache@v4
        with:
          path: llamafile/.cosmocc
          key: cosmocc-metal-${{ runner.os }}-4.0.2
      - run: make setup
      # macOS ships an old Xcode make; cosmocc provides a compatible one
      - name: Use cosmocc make
        run: |
          echo "$PWD/llamafile/.cosmocc/4.0.2/bin" >> $GITHUB_PATH
      - name: Reset stable-diffusion.cpp to unpatched state
        run: |
          cd llamafile/stable-diffusion.cpp
          git reset --hard
          git clean -fdx
      - run: make MODE=${{ env.MODE }}
      - uses: actions/upload-artifact@v4
        with:
          name: chimerafile-cpu+metal
          path: llamafile/o/${{ env.MODE }}/chimerafile/chimerafile
          compression-level: 0

  # ── 6. CPU + all GPUs (Vulkan + CUDA + ROCm) ─────────────────────────────
  all:
    needs: [cpu, vulkan, cuda, rocm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: chimerafile-cpu
      - uses: actions/download-artifact@v4
        with:
          name: ggml-vulkan-so
      - uses: actions/download-artifact@v4
        with:
          name: ggml-cuda-so
      - uses: actions/download-artifact@v4
        with:
          name: ggml-rocm-so
      - uses: actions/download-artifact@v4
        with:
          name: zipalign-tool

      - name: Bundle all GPU backends into single APE
        run: |
          chmod +x zipalign
          cp chimerafile chimerafile-cpu+all-gpu.elf
          chmod +x chimerafile-cpu+all-gpu.elf
          for so in ggml-vulkan.so ggml-cuda.so ggml-rocm.so; do
            if [ -f "$so" ]; then
              echo "   Bundling: $so"
              ./zipalign -j0 chimerafile-cpu+all-gpu.elf "$so"
            fi
          done
          ls -lh chimerafile-cpu+all-gpu.elf

      - uses: actions/upload-artifact@v4
        with:
          name: chimerafile-cpu+all-gpu
          path: chimerafile-cpu+all-gpu.elf
          compression-level: 0

  # ── Release ────────────────────────────────────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [cpu, vulkan, cuda, rocm, metal, all]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Rename and checksum
        run: |
          VER=$(echo ${{ github.ref_name }} | sed s/^v//)
          for variant in cpu cpu+vulkan cpu+cuda cpu+rocm cpu+metal cpu+all-gpu; do
            src="chimerafile-${variant}/chimerafile"
            [ -f "$src" ] || src="chimerafile-${variant}.elf"
            mv "$src" "chimerafile-${VER}-${variant}.elf"
          done
          sha256sum *.elf > SHA256SUMS.txt
          ls -lh *.elf

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            *.elf
            SHA256SUMS.txt
          generate_release_notes: true
